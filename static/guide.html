<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ALIGN Design Showcase — Guide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@awesome.me/webawesome@3.2.1/dist-cdn/styles/webawesome.css"
    />
    <link rel="stylesheet" href="./shared.css" />
    <link rel="stylesheet" href="./guide.css" />
  </head>
  <body>
    <nav class="showcase-nav">
      <div class="nav-brand">ALIGN <span>Design Showcase</span></div>
      <div class="nav-tabs">
        <a href="guide.html" class="nav-tab active">Guide</a>
        <a href="tour.html" class="nav-tab">Tour</a>
        <a href="wizard.html" class="nav-tab">Wizard</a>
        <a href="scroll.html" class="nav-tab">Scroll</a>
        <a href="accordion.html" class="nav-tab">Accordion</a>
        <a href="slides.html" class="nav-tab">Slide Deck</a>
      </div>
    </nav>

    <div class="guide-layout">
      <aside class="guide-toc">
        <div class="toc-items">
          <button class="toc-pill active" data-toc="scenario"><span class="toc-dot"></span>Hard Choices</button>
          <button class="toc-pill" data-toc="baseline"><span class="toc-dot"></span>Decision</button>
          <button class="toc-pill" data-toc="values"><span class="toc-dot"></span>Values</button>
          <button class="toc-pill" data-toc="alignment"><span class="toc-dot"></span>Aligned AI</button>
          <button class="toc-pill" data-toc="comparison"><span class="toc-dot"></span>Side by Side</button>
          <button class="toc-pill" data-toc="sandbox"><span class="toc-dot"></span>Explore</button>
          <button class="toc-pill" data-toc="learn-more"><span class="toc-dot"></span>Learn More</button>
        </div>
      </aside>

      <main class="guide-viewport" data-step="0">
        <div class="step-content">
          <div class="step-header">
            <h2 class="section-heading" data-step-heading></h2>
            <p class="section-subtitle" data-step-subtitle></p>
          </div>
          <div class="zone zone-scenario" data-zone="scenario"></div>
          <div class="zone zone-decider-baseline" data-zone="decider-baseline"></div>
          <div class="zone zone-decision-baseline" data-zone="decision-baseline"></div>
          <div class="zone zone-values" data-zone="values"></div>
          <div class="zone zone-decider-aligned" data-zone="decider-aligned"></div>
          <div class="zone zone-connectors" data-zone="connectors"></div>
          <div class="zone zone-decision-aligned" data-zone="decision-aligned"></div>
          <div class="zone zone-comparison" data-zone="comparison"></div>
          <div class="zone zone-learn-more" data-zone="learn-more">
            <div class="learn-more-links">
              <a href="https://arxiv.org/abs/2507.09037" target="_blank" rel="noopener" class="learn-more-card">
                <span class="learn-more-icon">&#x1F4C4;</span>
                <span class="learn-more-text">
                  <span class="learn-more-title">Research Paper</span>
                  <span class="learn-more-desc">Read the full paper on arXiv</span>
                </span>
              </a>
              <a href="https://www.kitware.com/ethical-explainable-ai-in-action-darpa-itm-phase-1-contributions/" target="_blank" rel="noopener" class="learn-more-card">
                <span class="learn-more-icon">&#x1F4DD;</span>
                <span class="learn-more-text">
                  <span class="learn-more-title">Blog Post</span>
                  <span class="learn-more-desc">Ethical AI in action — DARPA ITM Phase 1</span>
                </span>
              </a>
              <a href="https://paul-elliott--align-app-serve.modal.run" target="_blank" rel="noopener" class="learn-more-card">
                <span class="learn-more-icon">&#x1F9ED;</span>
                <span class="learn-more-text">
                  <span class="learn-more-title">Full Sandbox App</span>
                  <span class="learn-more-desc">Try the interactive ALIGN system</span>
                </span>
              </a>
            </div>
          </div>
        </div>

        <div class="step-nav">
          <button class="step-btn step-btn-back" data-prev>Back</button>
          <button class="step-btn step-btn-next" data-next>Next</button>
          <span class="scroll-hint" data-scroll-hint><span class="scroll-mouse"><span class="scroll-mouse-wheel"></span></span></span>
        </div>
      </main>
    </div>

    <script type="module" src="./guide.js"></script>

</html>
